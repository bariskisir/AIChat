<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Chat</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/chat.css">
    <link rel="stylesheet" href="styles/controls.css">
    <link rel="stylesheet" href="styles/utilities.css">
  </head>
  <body>
    <main id="appShell" class="ch-shell">
      <section class="ch-view--main">
        <header id="statusRow" class="ch-toolbar">
          <span id="statusText">Ready.</span>
        </header>

        <section class="ch-toolbar--model">
          <div class="ch-model-bar">
            <label class="ch-select-field">
              <span>Model</span>
              <div class="ch-model-dropdown">
                <button id="modelDropdownButton" class="ch-model-dropdown__button" type="button" aria-haspopup="listbox" aria-expanded="false">Select model</button>
                <select id="modelSelect" title="Model" hidden></select>
                <div id="modelDropdown" class="ch-model-dropdown__panel" hidden>
                  <input id="modelSearchInput" class="ch-model-dropdown__search" type="search" placeholder="Search models" autocomplete="off">
                  <div id="modelOptionList" class="ch-model-dropdown__list" role="listbox"></div>
                </div>
              </div>
            </label>
            <label id="reasoningField" class="ch-select-field">
              <span>Reasoning</span>
              <select id="reasoningSelect" title="Reasoning">
                <option value="none">none</option>
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
              </select>
            </label>
            <label id="thinkingField" class="ch-select-field" hidden>
              <span>Thinking</span>
              <select id="thinkingSelect" title="Thinking"></select>
            </label>
            <label id="verbosityField" class="ch-select-field" hidden>
              <span>Verbosity</span>
              <select id="verbositySelect" title="Verbosity">
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
              </select>
            </label>
            <label id="claudeExtendedThinkingField" class="ch-toggle-field" title="Enable extended thinking for Claude" hidden>
              <span>Extended Thinking</span>
              <input id="claudeExtendedThinking" class="ch-toggle" type="checkbox">
            </label>
            <label id="claudeEffortField" class="ch-select-field" hidden>
              <span>Effort</span>
              <select id="claudeEffortSelect" title="Claude effort">
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
              </select>
            </label>
            <button id="btnRefresh" class="ch-btn--icon" type="button" title="Refresh models">&#8635;</button>
          </div>
        </section>

        <section class="ch-toolbar--actions">
          <div class="ch-tool-group">
            <button id="btnNewSession" class="ch-btn--add" type="button" title="New chat" aria-label="New chat">+</button>
            <button id="btnCompact" class="ch-btn--sm" type="button">Compact</button>
            <button id="btnAlwaysOnTop" class="ch-btn--sm" type="button" aria-pressed="false">Always on Top</button>
            <button id="btnProviders" class="ch-btn--sm" type="button">Providers</button>
            <button id="btnSettings" class="ch-btn--sm" type="button">Settings</button>
          </div>
          <button id="btnCopyChat" class="ch-btn--sm ch-btn--copy" type="button" title="Copy chat" aria-label="Copy chat">&#9112;</button>
        </section>

        <section class="ch-workspace">
          <aside class="ch-sidebar">
            <nav id="navSessions" class="ch-sidebar__nav" aria-label="Chat sessions"></nav>
          </aside>
          <div id="resizerSidebar" class="ch-sidebar__resizer" role="separator" aria-orientation="vertical"></div>

          <section class="ch-chat">
            <div id="chatMessages" class="ch-chat__messages"></div>
            <div id="resizerComposer" class="ch-composer__resizer" role="separator" aria-orientation="horizontal"></div>
            <form id="formComposer" class="ch-composer">
              <div id="composerPreview" class="ch-composer__preview" hidden></div>
              <div class="ch-composer__controls">
                <textarea id="inputComposer" class="ch-composer__input"></textarea>
                <button id="btnSend" class="ch-btn--primary ch-btn--send" type="submit">Send</button>
              </div>
            </form>
          </section>
        </section>

        <footer class="ch-footer">
          <button id="btnDeveloper" type="button">Developed by Bar&#305;&#351; K&#305;s&#305;r</button>
          <button id="btnSource" type="button">Source</button>
        </footer>
      </section>
      <dialog id="providerDialog" class="ch-dialog ch-provider-dialog">
        <div class="ch-dialog__header">
          <strong>Providers</strong>
          <button id="btnCloseProviders" class="ch-btn--icon" type="button" title="Close">X</button>
        </div>
        <header id="providerStatusRow" class="ch-toolbar ch-provider-status">
          <span id="providerStatusText">Select a provider or add a new one.</span>
        </header>
        <div class="ch-provider-panel">
          <aside class="ch-provider-panel__sidebar">
            <button id="btnAddProvider" class="ch-btn--add" type="button" title="Add provider" aria-label="Add provider">+</button>
            <nav id="providerList" class="ch-sidebar__nav" aria-label="Providers"></nav>
          </aside>
          <form id="providerForm" method="dialog" class="ch-provider-form">
            <div class="ch-provider-form__header">
              <strong id="providerEditorTitle">Provider</strong>
            </div>
            <input id="providerId" type="hidden">
            <label id="providerTemplateField">
              <span>Template</span>
              <div class="ch-model-dropdown ch-template-dropdown">
                <button id="providerTemplateButton" class="ch-model-dropdown__button" type="button" aria-haspopup="listbox" aria-expanded="false">Custom</button>
                <select id="providerTemplate" hidden>
                  <option value="">Custom</option>
                </select>
                <div id="providerTemplateDropdown" class="ch-model-dropdown__panel" hidden>
                  <input id="providerTemplateSearchInput" class="ch-model-dropdown__search" type="search" placeholder="Search providers" autocomplete="off">
                  <div id="providerTemplateOptionList" class="ch-model-dropdown__list" role="listbox"></div>
                </div>
              </div>
            </label>
            <label id="providerNameField">
              <span>Provider</span>
              <input id="providerName" type="text" autocomplete="off" required>
            </label>
            <label id="providerApiUrlField">
              <span>API URL</span>
              <input id="providerApiUrl" type="url" placeholder="https://api.openai.com/v1" required>
            </label>
            <label id="providerApiKeyField">
              <span>Token</span>
              <input id="providerApiKey" type="text" autocomplete="off">
            </label>
            <label id="providerCustomHeadersField">
              <span>Custom Headers</span>
              <input id="providerCustomHeaders" class="ch-provider-form__headers" type="text" spellcheck="false" placeholder='{ "x-opencode-session": "" }'>
            </label>
            <div id="codexLoginRow" class="ch-provider-form__auth" hidden>
              <button id="btnCodexLogin" class="ch-btn--primary" type="button">Sign in with ChatGPT</button>
              <section id="codexAccountPanel" class="ch-codex-account" hidden>
                <dl class="ch-codex-account__details">
                  <div>
                    <dt>Email</dt>
                    <dd id="codexAccountEmail">--</dd>
                  </div>
                  <div>
                    <dt>Plan</dt>
                    <dd id="codexAccountPlan">--</dd>
                  </div>
                  <div>
                    <dt>Limits</dt>
                    <dd class="ch-codex-account__limit">
                      <span id="codexAccountLimit">--</span>
                      <button id="btnCodexRefresh" class="ch-btn--icon" type="button" title="Refresh Codex account">&#8635;</button>
                    </dd>
                  </div>
                  <div>
                    <dt>Reset</dt>
                    <dd id="codexAccountReset">--</dd>
                  </div>
                  <div>
                    <dt>Models</dt>
                    <dd id="codexAccountModels">--</dd>
                  </div>
                </dl>
                <button id="btnCodexSignOut" class="ch-btn--sm" type="button">Sign out</button>
              </section>
            </div>
            <div id="claudeLoginRow" class="ch-provider-form__auth" hidden>
              <button id="btnClaudeLogin" class="ch-btn--primary" type="button">Sign in with Claude</button>
              <section id="claudeAccountPanel" class="ch-codex-account" hidden>
                <dl class="ch-codex-account__details">
                  <div>
                    <dt>Email</dt>
                    <dd id="claudeAccountEmail">--</dd>
                  </div>
                  <div>
                    <dt>Plan</dt>
                    <dd id="claudeAccountPlan">--</dd>
                  </div>
                  <div>
                    <dt>Models</dt>
                    <dd class="ch-codex-account__limit">
                      <span id="claudeAccountModels">--</span>
                      <button id="btnClaudeRefresh" class="ch-btn--icon" type="button" title="Refresh Claude account">&#8635;</button>
                    </dd>
                  </div>
                </dl>
                <button id="btnClaudeSignOut" class="ch-btn--sm" type="button">Sign out</button>
              </section>
            </div>
            <div id="providerActions" class="ch-dialog__actions">
              <button id="btnCancelProvider" class="ch-btn--sm" type="button">Cancel</button>
              <button class="ch-btn--primary" type="submit">Check and Save</button>
            </div>
          </form>
        </div>
      </dialog>
      <dialog id="settingsDialog" class="ch-dialog ch-settings-dialog">
        <div class="ch-dialog__header">
          <strong>Settings</strong>
          <button id="btnCloseSettings" class="ch-btn--icon" type="button" title="Close">X</button>
        </div>
        <div class="ch-settings-panel">
          <label class="ch-toggle-field">
            <span>Show Footer</span>
            <input id="settingsShowFooter" class="ch-toggle" type="checkbox" checked>
          </label>
          <label class="ch-toggle-field">
            <span>Show Information Bar</span>
            <input id="settingsShowInfoBar" class="ch-toggle" type="checkbox" checked>
          </label>
          <label class="ch-select-field ch-settings-title-gen">
            <span>Title Generation</span>
            <div class="ch-model-dropdown">
              <button id="settingsTitleGenDropdownButton" class="ch-model-dropdown__button" type="button" aria-haspopup="listbox" aria-expanded="false">Current</button>
              <select id="settingsTitleGenSelect" hidden></select>
              <div id="settingsTitleGenDropdown" class="ch-model-dropdown__panel" hidden>
                <input id="settingsTitleGenSearchInput" class="ch-model-dropdown__search" type="search" placeholder="Search models" autocomplete="off">
                <div id="settingsTitleGenOptionList" class="ch-model-dropdown__list" role="listbox"></div>
              </div>
            </div>
          </label>
        </div>
      </dialog>
    </main>
    <script src="app.js"></script>
  </body>
</html>
